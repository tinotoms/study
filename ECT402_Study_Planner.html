const Q = RAW.map((r, index) => ({
  id: index + 1,
  mod: r.m,
  topic: r.topic,
  q: r.q,
  marks: r.marks,
  rep: r.years.length,
  years: r.years.join(", ")
}));

function pri(q){
  if(q.rep >= 3) return 'must';
  if(q.rep === 2 && q.marks >= 7) return 'must';
  if(q.rep === 2 && q.marks === 3) return 'high';
  if(q.rep === 1 && q.marks >= 7) return 'high';
  return 'medium';
}

const done = new Set();
const pord = {must:0, high:1, medium:2};
const plabel = {must:'Must study', high:'High priority', medium:'Medium'};
const pbc = {must:'bm', high:'bh', medium:'bme'};
const pbarcl = {must:'pm', high:'ph', medium:'pme'};
const mnames = {
  1: 'Mod 1 — Cellular',
  2: 'Mod 2 — Channel',
  3: 'Mod 3 — OFDM',
  4: 'Mod 4 — MA',
  5: 'Mod 5 — Prop.'
};

function render(){
  const fp = document.getElementById('fp').value;
  const fm = document.getElementById('fm').value;
  const fmk = document.getElementById('fmk').value;
  const fd = document.getElementById('fd').value;

  let qs = Q.map(q => ({...q, priority: pri(q)}));

  const c = {must:0, high:0, medium:0};
  qs.forEach(q => c[q.priority]++);
  document.getElementById('sm').textContent = c.must;
  document.getElementById('sh').textContent = c.high;
  document.getElementById('sme').textContent = c.medium;
  document.getElementById('stot').textContent = Q.length;

  const dn = done.size;
  document.getElementById('ptxt').textContent = dn + ' of ' + Q.length + ' done';
  document.getElementById('ppct').textContent = Math.round(dn / Q.length * 100) + '%';
  document.getElementById('pbar').style.width = Math.round(dn / Q.length * 100) + '%';

  qs.sort((a,b) => pord[a.priority] - pord[b.priority] || b.rep - a.rep || b.marks - a.marks);

  if(fp !== 'all') qs = qs.filter(q => q.priority === fp);
  if(fm !== 'all') qs = qs.filter(q => q.mod === parseInt(fm));
  if(fmk !== 'all') qs = qs.filter(q => fmk === '3' ? q.marks === 3 : q.marks >= 6);
  if(fd === 'pending') qs = qs.filter(q => !done.has(q.id));
  if(fd === 'done') qs = qs.filter(q => done.has(q.id));

  let html = '';
  let lastP = null;
  qs.forEach(q => {
    if(q.priority !== lastP){
      html += `<div class="sec">${plabel[q.priority]}</div>`;
      lastP = q.priority;
    }
    const d = done.has(q.id);
    const rb = q.rep >= 2 ? `<span class="badge brep">repeated ×${q.rep}</span>` : '';
    html += `<div class="qc ${d ? 'done' : ''}" onclick="tog(${q.id})">
      <div class="chk ${d ? 'on' : ''}"><div class="cm"></div></div>
      <div class="pbar ${pbarcl[q.priority]}"></div>
      <div class="qbody">
        <div class="meta">
          <span class="badge ${pbc[q.priority]}">${plabel[q.priority]}</span>
          <span class="badge bmod">${mnames[q.mod]} • ${q.topic}</span>
          <span class="badge bmk">${q.marks} marks</span>
          ${rb}
        </div>
        <p class="qt">${q.q}</p>
        <p class="qy">Asked in: ${q.years}</p>
      </div>
    </div>`;
  });

  if(!qs.length) html = '<div class="empty">No questions match the current filters.</div>';
  document.getElementById('ql').innerHTML = html;
}

function tog(id){
  done.has(id) ? done.delete(id) : done.add(id);
  render();
}

// Initialize
document.getElementById('subtxt').innerHTML = `Priority study planner &bull; ${Q.length} questions from 6 papers (2023–2025) &bull; Click any question to mark as done`;
render();
</script>
