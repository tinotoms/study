<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECT402 — Wireless Communication | Smart Study Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem;line-height:1.5}
h1{font-size:21px;font-weight:700;margin-bottom:4px}
.sub{font-size:13.5px;color:#555;margin-bottom:1.3rem}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.1rem}
select{font-size:13px;padding:7px 11px;border-radius:8px;border:1px solid #ccc;background:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:1.4rem}
.stat{background:#fff;border-radius:9px;padding:0.75rem 1.1rem;border:1px solid #eee}
.sl{font-size:11px;color:#777;margin-bottom:3px}
.sv{font-size:23px;font-weight:700}
.pgwrap{margin-bottom:1.4rem}
.pglabel{font-size:12.5px;color:#555;display:flex;justify-content:space-between;margin-bottom:6px}
.pgtrack{height:7px;background:#e8e8e8;border-radius:4px;overflow:hidden}
.pgfill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.4s}
.sec{font-size:13px;font-weight:700;color:#444;margin:1.4rem 0 0.5rem;padding-bottom:5px;border-bottom:1.5px solid #ddd;text-transform:uppercase;letter-spacing:0.6px}
.q-list{display:flex;flex-direction:column;gap:8px}
.qc{background:#fff;border:1px solid #e8e8e8;border-radius:13px;padding:0.9rem 1.1rem;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:all 0.15s}
.qc:hover{background:#fafaf8}
.qc.done{opacity:0.45}
.qc.done .qt{text-decoration:line-through;color:#666}
.pbar{width:5px;border-radius:5px;flex-shrink:0;align-self:stretch;min-height:48px}
.pm{background:#E24B4A}.ph{background:#D97F1F}.pme{background:#2A7BC1}
.qbody{flex:1}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.badge{font-size:11.5px;padding:3px 9px;border-radius:5px;font-weight:600}
.bm{background:#FCEBEB;color:#8B1F1F}
.bh{background:#FAEEDA;color:#7A4A0F}
.bme{background:#E6F1FB;color:#0F4A7A}
.bmod{background:#f0f0ee;color:#444}
.brep{background:#FCEBEB;color:#8B1F1F}
.qt{font-size:13.8px;line-height:1.52}
.qy{font-size:11.5px;color:#999;margin-top:5px}
.chk{width:19px;height:19px;border-radius:50%;border:2.2px solid #bbb;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center}
.chk.on{background:#1D9E75;border-color:#1D9E75}
.cm{width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:none}
.chk.on .cm{display:block}
.empty{text-align:center;padding:3rem 1rem;color:#888;font-size:14px}
</style>
</head>
<body>
<h1>ECT402 — Wireless Communication</h1>
<p class="sub" id="subtxt">Smart Priority Planner • High-yield clusters from 6 papers (2023–2025)</p>

<div class="pgwrap">
  <div class="pglabel"><span id="ptxt">0 of 0 done</span><span id="ppct">0%</span></div>
  <div class="pgtrack"><div class="pgfill" id="pbar" style="width:0%"></div></div>
</div>

<div class="controls">
  <select id="fp" onchange="render()">
    <option value="all">All Priorities</option>
    <option value="must">Must Study (Core)</option>
    <option value="high">High Priority</option>
    <option value="medium">Medium</option>
  </select>
  <select id="fm" onchange="render()">
    <option value="all">All Modules</option>
    <option value="1">Module 1 — Cellular &amp; WLAN</option>
    <option value="2">Module 2 — Propagation &amp; Fading</option>
    <option value="3">Module 3 — OFDM &amp; Multicarrier</option>
    <option value="4">Module 4 — Equalization &amp; Multiple Access</option>
    <option value="5">Module 5 — Radio Wave Propagation</option>
  </select>
  <select id="fd" onchange="render()">
    <option value="all">Show All</option>
    <option value="pending">Pending Only</option>
    <option value="done">Done Only</option>
  </select>
</div>

<div class="stats">
  <div class="stat"><div class="sl">Must Study</div><div class="sv" id="sm" style="color:#A32D2D">0</div></div>
  <div class="stat"><div class="sl">High Priority</div><div class="sv" id="sh" style="color:#BA7517">0</div></div>
  <div class="stat"><div class="sl">Medium</div><div class="sv" id="sme" style="color:#185FA5">0</div></div>
  <div class="stat"><div class="sl">Total</div><div class="sv" id="stot" style="color:#222">0</div></div>
</div>

<div class="q-list" id="ql"></div>

<script>
// === HIGH-YIELD CLUSTERED DATA ===
const Q = [
  // Module 1 - Very High Weight
  {id:101, mod:1, topic:"Frequency Reuse & SIR", q:"Explain frequency reuse concept. Derive relation between SIR, cluster size and capacity.", marks:7, rep:5, years:"Multiple papers"},
  {id:102, mod:1, topic:"Handoff Techniques", q:"Describe different types of handoff (hard, soft, etc.) with advantages/disadvantages.", marks:7, rep:5, years:"Multiple"},
  {id:103, mod:1, topic:"Cell Splitting & Sectoring", q:"How do cell splitting and sectoring improve capacity and coverage?", marks:7, rep:4, years:"Multiple"},
  {id:104, mod:1, topic:"Cellular Generations", q:"Compare features of 2G, 3G, 4G and 5G systems.", marks:7, rep:6, years:"Multiple"},
  {id:105, mod:1, topic:"Trunking & Grade of Service", q:"Define trunking and GOS with relevant formulae.", marks:6, rep:3, years:"Multiple"},
  {id:106, mod:1, topic:"WLAN Standards & Architecture", q:"Compare WLAN standards or explain WLAN architecture.", marks:7, rep:4, years:"Multiple"},

  // Module 2
  {id:201, mod:2, topic:"Two-Ray Ground Model", q:"Derive path loss expression for Two-Ray Ground Reflection model.", marks:8, rep:4, years:"Jun23,Aug24,Apr25"},
  {id:202, mod:2, topic:"Free Space / Friis Transmission", q:"Friis equation / Received power calculation in free space.", marks:7, rep:3, years:"Multiple"},
  {id:203, mod:2, topic:"Small Scale Fading Types", q:"Differentiate flat vs frequency selective fading / types of small scale fading.", marks:6, rep:5, years:"Multiple"},
  {id:204, mod:2, topic:"Doppler Shift & Coherence Time", q:"Derive Doppler shift / Calculate coherence time.", marks:5, rep:4, years:"Multiple"},
  {id:205, mod:2, topic:"Multipath & Delay Spread", q:"Explain multipath propagation and its effect on delay spread.", marks:7, rep:3, years:"Multiple"},

  // Module 3
  {id:301, mod:3, topic:"OFDM Block Diagram & Working", q:"Explain OFDM system with block diagram and role of cyclic prefix.", marks:9, rep:5, years:"Multiple"},
  {id:302, mod:3, topic:"PAPR in OFDM", q:"What is PAPR in OFDM and techniques to reduce it.", marks:5, rep:4, years:"Multiple"},
  {id:303, mod:3, topic:"BPSK in Flat Fading", q:"Derive average bit error probability of BPSK in Rayleigh flat fading.", marks:7, rep:4, years:"Multiple"},
  {id:304, mod:3, topic:"Cyclic Prefix & ISI Mitigation", q:"Why cyclic prefix is used in OFDM / how it converts linear to circular convolution.", marks:7, rep:3, years:"Multiple"},

  // Module 4
  {id:401, mod:4, topic:"FDMA vs TDMA vs CDMA", q:"Compare FDMA, TDMA and CDMA techniques.", marks:7, rep:6, years:"Multiple"},
  {id:402, mod:4, topic:"Equalization Techniques", q:"Explain linear vs non-linear equalizer / Zero Forcing / MMSE equalizer.", marks:7, rep:5, years:"Multiple"},
  {id:403, mod:4, topic:"Diversity Techniques", q:"Explain diversity techniques and Selection Combining / MRC.", marks:7, rep:4, years:"Multiple"},
  {id:404, mod:4, topic:"Alamouti Scheme / MIMO", q:"Explain 2x2 Alamouti scheme and received SNR.", marks:7, rep:3, years:"Multiple"},

  // Module 5
  {id:501, mod:5, topic:"LOS Distance & Radio Horizon", q:"Derive LOS distance between transmitter and receiver antennas.", marks:7, rep:4, years:"Multiple"},
  {id:502, mod:5, topic:"Critical Frequency & MUF", q:"Derive critical frequency, MUF and skip distance for ionospheric propagation.", marks:8, rep:5, years:"Multiple"},
  {id:503, mod:5, topic:"Ground Wave & Sky Wave Propagation", q:"Explain different modes of radio wave propagation.", marks:7, rep:4, years:"Multiple"},
  {id:504, mod:5, topic:"Effect of Earth's Magnetic Field", q:"Analyze effect of earth's magnetic field on radio wave propagation.", marks:7, rep:3, years:"Multiple"}
];

function getPriority(q) {
  if (q.rep >= 4) return 'must';
  if (q.rep >= 3 && q.marks >= 7) return 'must';
  if (q.rep >= 2 && q.marks >= 7) return 'high';
  if (q.marks >= 7) return 'high';
  return 'medium';
}

const done = new Set();
const pord = {must:0, high:1, medium:2};
const plabel = {must:'Must Study', high:'High Priority', medium:'Medium'};
const pbc = {must:'bm', high:'bh', medium:'bme'};
const pbarcl = {must:'pm', high:'ph', medium:'pme'};
const mnames = {1:'Mod 1',2:'Mod 2',3:'Mod 3',4:'Mod 4',5:'Mod 5'};

function render() {
  const fp = document.getElementById('fp').value;
  const fm = document.getElementById('fm').value;
  const fd = document.getElementById('fd').value;

  let qs = Q.map(q => ({...q, priority: getPriority(q)}));

  const counts = {must:0, high:0, medium:0};
  qs.forEach(q => counts[q.priority]++);
  document.getElementById('sm').textContent = counts.must;
  document.getElementById('sh').textContent = counts.high;
  document.getElementById('sme').textContent = counts.medium;
  document.getElementById('stot').textContent = Q.length;

  const completed = done.size;
  document.getElementById('ptxt').textContent = `${completed} of ${Q.length} done`;
  document.getElementById('ppct').textContent = Math.round(completed / Q.length * 100) + '%';
  document.getElementById('pbar').style.width = Math.round(completed / Q.length * 100) + '%';

  qs.sort((a,b) => pord[a.priority] - pord[b.priority] || b.rep - a.rep || b.marks - a.marks);

  if (fp !== 'all') qs = qs.filter(q => q.priority === fp);
  if (fm !== 'all') qs = qs.filter(q => q.mod === parseInt(fm));
  if (fd === 'pending') qs = qs.filter(q => !done.has(q.id));
  if (fd === 'done') qs = qs.filter(q => done.has(q.id));

  let html = '';
  let lastPriority = null;

  qs.forEach(q => {
    if (q.priority !== lastPriority) {
      html += `<div class="sec">${plabel[q.priority]}</div>`;
      lastPriority = q.priority;
    }
    const isDone = done.has(q.id);
    const repTag = q.rep >= 3 ? `<span class="badge brep">×${q.rep} repeated</span>` : '';
    
    html += `
      <div class="qc ${isDone ? 'done' : ''}" onclick="tog(${q.id})">
        <div class="chk ${isDone ? 'on' : ''}"><div class="cm"></div></div>
        <div class="pbar ${pbarcl[q.priority]}"></div>
        <div class="qbody">
          <div class="meta">
            <span class="badge ${pbc[q.priority]}">${plabel[q.priority]}</span>
            <span class="badge bmod">${mnames[q.mod]} — ${q.topic}</span>
            <span class="badge bmk">${q.marks} marks</span>
            ${repTag}
          </div>
          <p class="qt">${q.q}</p>
          <p class="qy">Repeated in: ${q.years}</p>
        </div>
      </div>`;
  });

  document.getElementById('ql').innerHTML = html || '<div class="empty">No questions match filters.</div>';
}

function tog(id) {
  done.has(id) ? done.delete(id) : done.add(id);
  render();
}

document.getElementById('subtxt').innerHTML = `Smart Priority Planner • Focused on ~40 core clusters from 6 papers (2023–2025) • Click to mark done`;
render();
</script>
</body>
</html>
